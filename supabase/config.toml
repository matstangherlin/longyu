# Longyu — configuração local Supabase CLI.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "longyu"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:4173", "http://localhost:5173"]
enable_signup = true

# Stripe envia webhooks sem JWT do Supabase.
[functions.stripe-webhook]
verify_jwt = false

# Analytics anônimo (landing/onboarding antes do login).
[functions.submit-analytics]
verify_jwt = false
