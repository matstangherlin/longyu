name: Deploy Leagues

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/004_leagues.sql"
      - "scripts/deploy-leagues.mjs"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy league migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: drjcfalvlbbeblmmyhwj
        run: npm run deploy:leagues

      - name: Verify leagues backend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: drjcfalvlbbeblmmyhwj
          VITE_SUPABASE_URL: https://drjcfalvlbbeblmmyhwj.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run verify:leagues
