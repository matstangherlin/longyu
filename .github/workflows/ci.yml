name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    name: Portão de qualidade (validate:beta + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate beta
        run: npm run validate:beta

      - name: Build
        run: npm run build

      # Relatórios de qualidade regenerados pela cadeia beta (com procedência
      # e hash de integridade) — sempre anexados, mesmo em falha, para triagem.
      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            reports/exercise-depth-report.md
            reports/image-coverage-report.md
            reports/conversation-coverage-report.md
            reports/lesson-novelty-report.md
          if-no-files-found: error

  e2e:
    name: Testes E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: warn

  e2e-cross-browser:
    name: E2E cross-engine (WebKit + Firefox — informativo)
    runs-on: ubuntu-latest
    needs: quality
    # Não bloqueia o merge: valida os motores WebKit (≈ Safari) e Firefox, cujos
    # binários não existem no ambiente de automação padrão. Ver docs/REAL_DEVICE_QA.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (webkit + firefox)
        run: npx playwright install webkit firefox chromium --with-deps

      - name: E2E WebKit (Safari) + mobile Safari
        run: npm run test:e2e:webkit

      - name: E2E Firefox
        run: npm run test:e2e:firefox

      - name: Upload cross-browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-cross-browser
          path: playwright-report
          if-no-files-found: warn
